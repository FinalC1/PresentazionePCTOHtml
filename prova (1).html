<!DOCTYPE html>
<html lang="it">
<head>

  <title>Prova Interattiva — Siringa di Dosaggio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #111827 !important; color: #E5E7EB; font-family: 'Inter', sans-serif; }
  </style>

<body class="min-h-screen flex flex-col items-center justify-center bg-gray-900 text-gray-200 px-4">
