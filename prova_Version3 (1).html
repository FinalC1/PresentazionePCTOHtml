<!DOCTYPE html>

<head>

  <title>Prova Interattiva — Siringa di Dosaggio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #111827 !important; color: #E5E7EB; font-family: 'Inter', sans-serif; }
    .lamp { width: 20px; height: 20px; border-radius: 50%; transition: background-color 0.3s, box-shadow 0.3s; }
    .lamp-off { background-color: #4B5563; }
    .lamp-yellow { background-color: #FBBF24; box-shadow: 0 0 10px #FBBF24; }
    .lamp-red { background-color: #F87171; box-shadow: 0 0 10px #F87171; }
    .lamp-green { background-color: #22C55E; box-shadow: 0 0 10px #22C55E; }
    @keyframes blink { 50% { opacity: 0.2; } }
    .blinking { animation: blink 1s linear infinite; }
    .chart-container { position: relative; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; height: 300px; max-height: 400px; }
    @media (min-width: 768px) { .chart-container { height: 350px; } }
  </style>
</head>
